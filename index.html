<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>Stack Ball Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Bricolage+Grotesque:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      /* Modern Soft Sunset Palette - Easy on Eyes */
      --bg-top:#FFF5F7;
      --bg-mid:#FFE5EC;
      --bg-bottom:#FFC4D6;
      --mist-1:rgba(255,182,193,0.15);
      --mist-2:rgba(254,194,96,0.12);
      
      /* UI Colors */
      --primary:#FF6B9D;
      --primary-light:#FF8DB3;
      --secondary:#FEC260;
      --accent:#C44569;
      --glass-bg:rgba(255,255,255,0.75);
      --glass-border:rgba(255,255,255,0.9);
      --shadow-soft:rgba(196,69,105,0.15);
      
      /* Typography */
      --ui-font:"Outfit","Segoe UI","Helvetica Neue",sans-serif;
      --title-font:"Bricolage Grotesque","Poppins","Arial Rounded",sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
    body{
      background:
        radial-gradient(1200px 500px at 50% -10%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 65%),
        radial-gradient(900px 450px at 15% 15%, var(--mist-1) 0%, rgba(255,182,193,0) 70%),
        radial-gradient(950px 480px at 88% 18%, var(--mist-2) 0%, rgba(254,194,96,0) 68%),
        linear-gradient(180deg,var(--bg-top) 0%,var(--bg-mid) 45%,var(--bg-bottom) 100%);
      position:relative;
      animation:bgDrift 14s ease-in-out infinite alternate;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(600px 250px at 20% 80%, rgba(255,255,255,0.12), rgba(255,255,255,0) 75%),
        radial-gradient(500px 200px at 80% 25%, rgba(255,255,255,0.08), rgba(255,255,255,0) 75%);
      pointer-events:none;
      z-index:0;
      animation:mistDrift 16s ease-in-out infinite alternate;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 40%, rgba(196,69,105,0.08) 100%);
      pointer-events:none;
      z-index:0;
    }
    @keyframes bgDrift{
      0%{background-position:50% 0%, 15% 15%, 88% 18%, center;}
      100%{background-position:50% 0%, 18% 20%, 85% 15%, center;}
    }
    @keyframes mistDrift{
      0%{transform:translate3d(-1.2%,0,0) scale(1.01);}
      100%{transform:translate3d(1.2%,-0.6%,0) scale(1.03);}
    }
    #app{width:100vw;height:100vh;position:relative;}
    #ui{position:absolute;inset:0;pointer-events:none;font-family:var(--ui-font);z-index:5;}
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
